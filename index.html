<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/home</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
text-align:center;
overflow:hidden;
background:black;
}

/* background particles */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* navbar */

nav{
position:fixed;
top:0;
width:100%;
padding:20px;
background:rgba(0,0,0,0.6);
}

nav a{
color:white;
text-decoration:none;
margin:0 20px;
font-size:18px;
}

nav a:hover{
color:red;
}

/* main section */

section{
padding-top:160px;
}

/* card */

.card{
background:rgba(0,0,0,0.6);
border-radius:15px;
padding:40px;
display:inline-block;
border:1px solid red;
box-shadow:0 0 25px rgba(255,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* title */

h1{
font-size:50px;
margin-bottom:10px;
}

/* discord button */

.discord{
display:inline-block;
margin-top:20px;
padding:12px 30px;
border-radius:8px;
background:red;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.2s;
}

.discord:hover{
background:#cc0000;
transform:scale(1.05);
}

/* links */

.links{
margin-top:25px;
}

.linkbtn{
display:block;
margin:10px auto;
padding:12px 25px;
width:220px;
border:1px solid red;
border-radius:8px;
text-decoration:none;
color:white;
background:black;
transition:0.2s;
}

.linkbtn:hover{
background:red;
transform:scale(1.05);
}

/* counters */

.counter{
margin-top:15px;
opacity:0.8;
}

footer{
position:fixed;
bottom:0;
width:100%;
padding:10px;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="/">Home</a>
<a href="https://discord.gg/A5bx7pWee" target="_blank">Discord</a>
</nav>

<section>

<div class="card">

<h1 id="typing"></h1>

<p>Welcome to my page</p>

<a class="discord" href="https://discord.gg/A5bx7pWee" target="_blank">
Join Discord
</a>

<div class="links">

<a class="linkbtn" href="https://www.tiktok.com/@pleasecomebackimissyouuu" target="_blank">
TikTok @pleasecomebackimissyouuu
</a>

<a class="linkbtn" href="https://www.tiktok.com/@love2deep4u" target="_blank">
TikTok @love2deep4u
</a>

<a class="linkbtn" href="https://www.tiktok.com/@._larping" target="_blank">
TikTok @._larping
</a>

<a class="linkbtn" href="https://guns.lol/2346w" target="_blank">
guns.lol
</a>

</div>

<div class="counter">
Members: <span id="members">Loading...</span>
</div>

<div class="counter">
Visitors: <span id="visits">Loading...</span>
</div>

</div>

</section>

<footer>
© 2026
</footer>

<script>

/* typing animation */

const text="/home";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,120);
}
}

type();

/* particles */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.fillStyle="red";
ctx.globalAlpha=0.5;
ctx.fillRect(p.x,p.y,2,2);

});

requestAnimationFrame(draw);

}

draw();

/* discord member counter */

fetch("https://discord.com/api/v9/invites/A5bx7pWee?with_counts=true")
.then(res=>res.json())
.then(data=>{
document.getElementById("members").innerText=data.approximate_member_count;
});

/* visitor counter */

let visits=localStorage.getItem("visits");

if(!visits){
visits=1;
}else{
visits=Number(visits)+1;
}

localStorage.setItem("visits",visits);

document.getElementById("visits").innerText=visits;

</script>

</body>
</html>
