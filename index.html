<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fall of Humanity</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* split background */

.left{
position:absolute;
left:0;
top:0;
width:50%;
height:100%;
background:#0a0a0a;
}

.right{
position:absolute;
right:0;
top:0;
width:50%;
height:100%;
background:#f2f2f2;
}

/* NAVBAR */

nav{
position:absolute;
top:30px;
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

nav ul{
display:flex;
gap:40px;
list-style:none;
}

nav a{
text-decoration:none;
font-weight:bold;
font-size:16px;
transition:0.3s;
}

nav a:hover{
opacity:0.6;
}

/* TEXT */

.leftText{
position:absolute;
left:8%;
top:45%;
font-size:55px;
font-weight:bold;
color:white;
}

.rightText{
position:absolute;
right:8%;
top:45%;
font-size:55px;
font-weight:bold;
color:black;
}

/* statue */

.statue{
position:relative;
z-index:5;
text-align:center;
}

.statue img{
width:330px;
}

/* button */

button{
margin-top:15px;
padding:12px 28px;
border-radius:25px;
border:none;
background:black;
color:white;
cursor:pointer;
font-size:14px;
}

/* floating shapes */

.piece{
position:absolute;
width:100px;
height:18px;
background:#222;
opacity:0.4;
animation:float 8s infinite linear;
}

@keyframes float{
0%{transform:translateY(0) rotate(0)}
50%{transform:translateY(-150px) rotate(90deg)}
100%{transform:translateY(0) rotate(180deg)}
}

/* MOBILE */

@media(max-width:800px){

.leftText,.rightText{
font-size:28px;
top:35%;
}

.statue img{
width:200px;
}

}

</style>
</head>

<body>

<!-- MUSIC -->

<audio autoplay loop id="music">
<source src="song.m4a" type="audio/mp4">
</audio>

<script>
document.addEventListener("click", () => {
document.getElementById("music").play();
});
</script>

<!-- BACKGROUND -->

<div class="left"></div>
<div class="right"></div>

<!-- NAVBAR -->

<nav>

<div>△</div>

<ul>

<li><a href="https://discord.gg/aqYdUhRVt" target="_blank">Discord</a></li>

<li><a href="https://www.instagram.com/z8q1z" target="_blank">Instagram</a></li>

<li><a href="https://www.tiktok.com/@love2deep4u" target="_blank">TikTok</a></li>

</ul>

</nav>

<!-- TEXT -->

<div class="leftText">THE FALL OF</div>
<div class="rightText">HUMANITY</div>

<!-- STATUE -->

<div class="statue">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Angel_statue.jpg/512px-Angel_statue.jpg">

<br>

<button>READ MORE</button>

</div>

<!-- FLOATING PIECES -->

<div class="piece" style="top:20%;left:20%"></div>
<div class="piece" style="top:60%;left:80%"></div>
<div class="piece" style="top:40%;left:50%"></div>
<div class="piece" style="top:70%;left:35%"></div>

</body>
</html>
