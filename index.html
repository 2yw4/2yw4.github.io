<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/home</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ff9c;
text-align:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

nav{
background:rgba(0,0,0,0.7);
padding:15px;
position:fixed;
top:0;
width:100%;
}

nav a{
color:#00ff9c;
text-decoration:none;
margin:0 20px;
font-size:18px;
}

nav a:hover{
color:white;
}

section{
padding-top:160px;
}

.terminal{
background:#0a0a0a;
border:1px solid #00ff9c;
padding:35px;
display:inline-block;
box-shadow:0 0 20px #00ff9c33;
}

h1{
font-size:45px;
margin-bottom:15px;
}

.discord{
display:inline-block;
margin-top:20px;
padding:10px 25px;
border:1px solid #00ff9c;
color:#00ff9c;
text-decoration:none;
transition:0.2s;
}

.discord:hover{
background:#00ff9c;
color:black;
}

.counter{
margin-top:20px;
font-size:18px;
color:white;
}

footer{
position:fixed;
bottom:0;
width:100%;
padding:10px;
background:#000;
color:#555;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="/">Home</a>
<a href="https://discord.gg/A5bx7pWee" target="_blank">Discord</a>
</nav>

<section>

<div class="terminal">

<h1 id="typing"></h1>

<p>> system online</p>
<p>> welcome to /home</p>

<a class="discord" href="https://discord.gg/A5bx7pWee" target="_blank">
Join Discord
</a>

<div class="counter">
Members: <span id="members">Loading...</span>
</div>

<div class="counter">
Visitors: <span id="visits">Loading...</span>
</div>

</div>

</section>

<footer>
© 2026 /home
</footer>

<script>

/* typing animation */

const text="/home";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,120);
}
}

type();

/* particle background */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.fillStyle="#00ff9c";
ctx.fillRect(p.x,p.y,2,2);
});

requestAnimationFrame(draw);
}

draw();

/* discord member counter */

fetch("https://discord.com/api/v9/invites/A5bx7pWee?with_counts=true")
.then(res=>res.json())
.then(data=>{
document.getElementById("members").innerText=data.approximate_member_count;
});

/* visitor counter */

let visits=localStorage.getItem("visits");

if(!visits){
visits=1;
}else{
visits=Number(visits)+1;
}

localStorage.setItem("visits",visits);

document.getElementById("visits").innerText=visits;

</script>

</body>
</html>
