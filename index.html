<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/home</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
border:2px solid red;
padding:40px;
border-radius:15px;
box-shadow:0 0 30px red;
width:320px;
}

.pfp{
width:150px;
height:150px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
box-shadow:0 0 20px red;
margin-bottom:20px;
}

.title{
font-size:28px;
color:red;
margin-bottom:25px;
}

.link{
display:block;
text-decoration:none;
color:white;
border:2px solid red;
padding:10px;
margin:10px 0;
border-radius:10px;
transition:0.3s;
}

.link:hover{
background:red;
color:black;
box-shadow:0 0 15px red;
}

.counter{
margin-top:20px;
color:red;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img src="IMG_1249.jpg" class="pfp">

<div class="title">/home</div>

<a class="link" href="https://www.tiktok.com/@pleasecomebackimissyouuu" target="_blank">
TikTok
</a>

<a class="link" href="https://www.tiktok.com/@love2deep4u" target="_blank">
TikTok 2
</a>

<a class="link" href="https://www.tiktok.com/@._larping" target="_blank">
TikTok 3
</a>

<a class="link" href="https://guns.lol/2346w" target="_blank">
guns.lol
</a>

<div class="counter">
Visitors: <span id="visits">1</span>
</div>

</div>

<script>

let visits = localStorage.getItem("visits");

if(!visits){
visits = 1;
}else{
visits++;
}

localStorage.setItem("visits", visits);

document.getElementById("visits").innerText = visits;

</script>

</body>
</html>
