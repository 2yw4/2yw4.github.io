<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/home</title>

<style>
body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

nav{
position:fixed;
top:0;
width:100%;
padding:18px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
}

nav a{
color:white;
text-decoration:none;
margin:0 20px;
font-size:16px;
opacity:.8;
transition:.2s;
}

nav a:hover{
opacity:1;
color:#ff2a2a;
}

section{
padding-top:170px;
}

.card{
background:rgba(0,0,0,.65);
border-radius:20px;
padding:50px;
display:inline-block;
border:1px solid rgba(255,0,0,.6);
box-shadow:0 0 40px rgba(255,0,0,.35);
transition:.3s;
max-width:400px;
width:90%;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 60px rgba(255,0,0,.6);
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
border:2px solid red;
object-fit:cover;
margin-bottom:18px;
}

h1{
font-size:42px;
margin-bottom:5px;
}

.bio{
opacity:.7;
margin-bottom:15px;
}

.discord{
display:inline-block;
margin-top:15px;
padding:12px 30px;
border-radius:8px;
background:#ff2a2a;
color:white;
text-decoration:none;
font-weight:bold;
transition:.2s;
}

.discord:hover{
transform:scale(1.05);
background:#d60000;
}

.links{
margin-top:25px;
}

.linkbtn{
display:block;
margin:10px auto;
padding:12px;
width:240px;
border-radius:10px;
border:1px solid rgba(255,0,0,.7);
background:rgba(0,0,0,.6);
color:white;
text-decoration:none;
transition:.25s;
}

.linkbtn:hover{
background:#ff2a2a;
transform:scale(1.05);
}

.counter{
margin-top:10px;
font-size:14px;
opacity:.7;
}

footer{
position:fixed;
bottom:0;
width:100%;
padding:10px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="/">Home</a>
<a href="https://discord.gg/A5bx7pWee" target="_blank">Discord</a>
</nav>

<section>

<div class="card">

<img class="avatar" src="https://i.imgur.com/2DhmtJ4.png">

<h1 id="typing"></h1>

<div class="bio">
welcome to my page
</div>

<a class="discord" href="https://discord.gg/A5bx7pWee" target="_blank">
Join Discord
</a>

<div class="links">

<a class="linkbtn" href="https://www.tiktok.com/@pleasecomebackimissyouuu" target="_blank">
TikTok @pleasecomebackimissyouuu
</a>

<a class="linkbtn" href="https://www.tiktok.com/@love2deep4u" target="_blank">
TikTok @love2deep4u
</a>

<a class="linkbtn" href="https://www.tiktok.com/@._larping" target="_blank">
TikTok @._larping
</a>

<a class="linkbtn" href="https://guns.lol/2346w" target="_blank">
guns.lol
</a>

</div>

<div class="counter">
Members: <span id="members">Loading...</span>
</div>

<div class="counter">
Visitors: <span id="visits">Loading...</span>
</div>

</div>

</section>

<footer>
Â© 2026
</footer>

<script>

const text="/home";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,120);
}
}
type();

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.4,
vy:(Math.random()-0.5)*0.4
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.fillStyle="red";
ctx.globalAlpha=.5;
ctx.fillRect(p.x,p.y,2,2);
});

requestAnimationFrame(draw);
}

draw();

fetch("https://discord.com/api/v9/invites/A5bx7pWee?with_counts=true")
.then(res=>res.json())
.then(data=>{
document.getElementById("members").innerText=data.approximate_member_count;
});

let visits=localStorage.getItem("visits");

if(!visits){
visits=1;
}else{
visits=Number(visits)+1;
}

localStorage.setItem("visits",visits);
document.getElementById("visits").innerText=visits;

</script>

</body>
</html>
