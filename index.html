<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fall Of Humanity</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(to right,#0a0a0a 50%,#f2f2f2 50%);
display:flex;
align-items:center;
justify-content:center;
}

/* NAVBAR */

nav{
position:absolute;
top:25px;
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.logo{
font-size:20px;
color:white;
font-weight:bold;
}

.menu{
display:flex;
gap:40px;
}

.menu a{
text-decoration:none;
font-weight:bold;
font-size:15px;
color:#555;
}

/* TEXT */

.leftText{
position:absolute;
left:10%;
top:45%;
font-size:55px;
font-weight:bold;
color:white;
}

.rightText{
position:absolute;
right:10%;
top:45%;
font-size:55px;
font-weight:bold;
color:#333;
}

/* ANGEL */

.angel{
position:absolute;
z-index:5;
}

.angel img{
width:420px;
filter:drop-shadow(0 30px 60px rgba(0,0,0,0.6));
}

/* FLOATING DEBRIS */

.debris{
position:absolute;
width:140px;
height:18px;
background:#777;
opacity:0.25;
animation:float 9s infinite linear;
}

@keyframes float{

0%{transform:translateY(0) rotate(0deg)}
50%{transform:translateY(-220px) rotate(90deg)}
100%{transform:translateY(0) rotate(180deg)}

}

/* MOBILE */

@media(max-width:800px){

.leftText,.rightText{
font-size:28px;
top:35%;
}

.angel img{
width:240px;
}

.menu{
gap:20px;
}

}

</style>
</head>

<body>

<audio id="music" loop>
<source src="song.m4a" type="audio/mp4">
</audio>

<script>
document.body.addEventListener("click",function(){
document.getElementById("music").play();
},{once:true});
</script>

<nav>

<div class="logo">△</div>

<div class="menu">
<a href="https://discord.gg/aqYdUhRVt" target="_blank">Discord</a>
<a href="https://www.instagram.com/z8q1z" target="_blank">Instagram</a>
<a href="https://www.tiktok.com/@love2deep4u" target="_blank">TikTok</a>
</div>

</nav>

<div class="leftText">THE FALL OF</div>
<div class="rightText">HUMANITY</div>

<div class="angel">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Angel_statue.jpg/512px-Angel_statue.jpg">
</div>

<div class="debris" style="top:15%;left:25%"></div>
<div class="debris" style="top:60%;left:20%"></div>
<div class="debris" style="top:40%;left:65%"></div>
<div class="debris" style="top:75%;left:70%"></div>
<div class="debris" style="top:30%;left:45%"></div>

</body>
</html>
