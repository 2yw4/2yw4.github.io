<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fall Of Humanity</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* background split */

.left{
position:absolute;
left:0;
top:0;
width:50%;
height:100%;
background:#0e0e0e;
}

.right{
position:absolute;
right:0;
top:0;
width:50%;
height:100%;
background:#f2f2f2;
}

/* navbar */

nav{
position:absolute;
top:30px;
right:40px;
z-index:10;
}

nav a{
margin-left:30px;
text-decoration:none;
font-weight:bold;
color:#6c63ff;
font-size:15px;
}

/* text */

.leftText{
position:absolute;
left:8%;
top:45%;
font-size:55px;
font-weight:bold;
color:white;
}

.rightText{
position:absolute;
right:8%;
top:45%;
font-size:55px;
font-weight:bold;
color:#555;
}

/* statue */

.statue{
position:absolute;
z-index:5;
text-align:center;
}

.statue img{
width:420px;
filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
}

/* floating pieces */

.piece{
position:absolute;
width:120px;
height:18px;
background:#444;
opacity:0.35;
animation:float 10s infinite linear;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
}

50%{
transform:translateY(-200px) rotate(90deg);
}

100%{
transform:translateY(0) rotate(180deg);
}

}

/* mobile */

@media(max-width:800px){

.leftText,.rightText{
font-size:28px;
top:35%;
}

.statue img{
width:240px;
}

}

</style>
</head>

<body>

<audio id="music" loop>
<source src="song.m4a" type="audio/mp4">
</audio>

<script>
document.body.addEventListener("click", function() {
document.getElementById("music").play();
},{ once:true });
</script>

<div class="left"></div>
<div class="right"></div>

<nav>
<a href="https://discord.gg/aqYdUhRVt" target="_blank">Discord</a>
<a href="https://www.instagram.com/z8q1z" target="_blank">Instagram</a>
<a href="https://www.tiktok.com/@love2deep4u" target="_blank">TikTok</a>
</nav>

<div class="leftText">THE FALL OF</div>
<div class="rightText">HUMANITY</div>

<div class="statue">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Angel_statue.jpg/512px-Angel_statue.jpg">
</div>

<div class="piece" style="top:20%;left:20%"></div>
<div class="piece" style="top:70%;left:30%"></div>
<div class="piece" style="top:30%;left:60%"></div>
<div class="piece" style="top:60%;left:80%"></div>

</body>
</html>
